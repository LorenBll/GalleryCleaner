<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GalleryCleaner</title>
    <link rel="stylesheet" href="/ui/css/index.css">
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1 class="title" style="animation: slideUpFadeIn 0.4s ease both 0s;"><a href="https://www.github.com/LorenBll/GalleryCleaner" target="_blank" class="title-link">GalleryCleaner</a></h1>
            <p class="subtitle" style="animation: slideUpFadeIn 0.4s ease both 0.15s;">Point to a folder of images, review them one by one with keyboard shortcuts, and delete unwanted ones to clean up your gallery.</p>
        </div>

        <main class="card" id="card" style="animation: slideUpFadeIn 0.4s ease both 0.3s;">
            <form id="clean-form">
                <div class="row">
                    <input id="path-input" type="text" autocomplete="off" spellcheck="false" placeholder="e.g. C:\Users\...\Pictures">
                    <button id="submit" type="submit" data-label="Confirm Path">
                        <svg class="submit-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        <div class="submit-spinner"></div>
                    </button>
                </div>
                <div class="checkbox-row">
                    <label class="checkbox-label" data-label="Index Images in the Subfolders Too">
                        <input type="checkbox" id="recursive" checked>
                        <span>Recursive Indexing</span>
                    </label>
                </div>
            </form>
        </main>

        <div class="gallery hidden" id="gallery">
            <div class="gallery-viewport">
                <button class="gallery-nav gallery-prev hidden" id="galleryPrev" data-label="Previous (A)">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div class="gallery-image-wrap" id="galleryImageWrap">
                    <img class="gallery-image" id="galleryImage" alt="" src="">
                </div>
                <button class="gallery-nav gallery-next hidden" id="galleryNext" data-label="Next (D)">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
            <div class="gallery-counter" id="galleryCounter"></div>
        </div>

        <div class="search-area" id="searchArea">
            <div class="search-bar hidden" id="searchBar">
                <div class="search-input-row">
                    <svg class="search-lens" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="searchInput" placeholder="Search files..." oninput="this.value = this.value.replace(/[^a-zA-Z0-9]/g, '')">
                    <button class="search-go" id="searchGo" data-label="Search">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                </div>
                <div class="filter-tweak" id="filterTweak">
                    <span class="filter-tweak-reset" id="filterTweakReset">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    </span>
                    <span class="filter-tweak-slider-wrap" data-label="Tweak Accuracy">
                        <input type="range" class="filter-tweak-slider" id="filterTweakSlider" min="0" max="100" value="30">
                    </span>
                    <span class="filter-tweak-btn" id="filterTweakBtn">
                        <svg class="filter-tweak-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="10" x2="20" y2="3"/><line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="12" x2="14" y2="12"/><line x1="18" y1="16" x2="22" y2="16"/></svg>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="search-overlay hidden" id="searchOverlay">
        <div class="progress-panel" id="progressPanel">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-info" id="progressInfo">Starting...</div>
            <div class="progress-detail" id="progressDetail"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('clean-form');
        const pathInput = document.getElementById('path-input');
        const submitButton = document.getElementById('submit');
        const card = document.getElementById('card');

        // --- Gallery state ---
        var _galleryResults = null;
        var _galleryIndex = 0;
        var _gallerySearchId = null;
        var _imageCache = {};

        const gallery = document.getElementById('gallery');
        const galleryImg = document.getElementById('galleryImage');
        const galleryPrev = document.getElementById('galleryPrev');
        const galleryNext = document.getElementById('galleryNext');
        const galleryCounter = document.getElementById('galleryCounter');

            function _prefetchRange(searchId, center, total) {
                var keep = {};
                for (var i = Math.max(0, center - 5); i < Math.min(total, center + 6); i++) {
                    keep[i] = true;
                    if (!_imageCache[searchId + ':' + i]) {
                        var img = new Image();
                        img.src = '/api/image/' + searchId + '/' + i;
                        _imageCache[searchId + ':' + i] = img;
                    }
                }
                for (var key in _imageCache) {
                    if (key.indexOf(searchId + ':') === 0) {
                        var idx = parseInt(key.split(':')[1], 10);
                        if (!keep[idx]) {
                            delete _imageCache[key];
                        }
                    }
                }
            }

            function _updateGalleryNav() {
                if (_galleryResults) {
                    var total = _galleryResults.length;
                    if (total === 0) { return; }
                    if (_galleryIndex > 0) {
                        galleryPrev.classList.remove('hidden');
                        galleryPrev.classList.add('gallery-nav-visible');
                    } else {
                        galleryPrev.classList.remove('gallery-nav-visible');
                        galleryPrev.classList.add('hidden');
                    }
                    if (_galleryIndex < total - 1) {
                        galleryNext.classList.remove('hidden');
                        galleryNext.classList.add('gallery-nav-visible');
                    } else {
                        galleryNext.classList.remove('gallery-nav-visible');
                        galleryNext.classList.add('hidden');
                    }
                }
            }

            function _goToImage(index) {
                if (!_galleryResults || index < 0 || index >= _galleryResults.length) return;
                _galleryIndex = index;
                galleryImg.classList.remove('gallery-image-loaded');
                galleryImg.src = '/api/image/' + _gallerySearchId + '/' + index;
                galleryImg.onload = function() {
                    galleryImg.classList.add('gallery-image-loaded');
                };
                galleryImg.onerror = function() {
                    galleryImg.classList.add('gallery-image-loaded');
                };
                galleryCounter.textContent = (index + 1) + ' / ' + _galleryResults.length;
                _updateGalleryNav();
                _prefetchRange(_gallerySearchId, index, _galleryResults.length);
            }

            function _goPrev() {
                if (_galleryResults && _galleryIndex > 0) {
                    _goToImage(_galleryIndex - 1);
                }
            }

            function _goNext() {
                if (_galleryResults && _galleryIndex < _galleryResults.length - 1) {
                    _goToImage(_galleryIndex + 1);
                }
            }

            galleryPrev.addEventListener('click', _goPrev);
            galleryNext.addEventListener('click', _goNext);

            function animHeight(from, cb, done) {
                card.style.overflow = 'hidden';
                card.style.height = from + 'px';
                void card.offsetHeight;
                cb();
                var to = card.scrollHeight + 2;
                if (Math.abs(to - from) <= 1) {
                    card.style.height = '';
                    card.style.overflow = '';
                    if (done) done();
                    return;
                }
                card.style.transition = 'height 0.3s ease';
                card.style.height = to + 'px';
                var onEnd = function() {
                    card.removeEventListener('transitionend', onEnd);
                    card.style.height = '';
                    card.style.overflow = '';
                    card.style.transition = '';
                    if (done) done();
                };
                card.addEventListener('transitionend', onEnd);
            }

            function fadeIn(el, slide) {
                el.style.opacity = '0';
                if (slide) el.style.transform = 'translateY(-12px)';
                card.appendChild(el);
                void el.offsetHeight;
                var props = 'opacity 0.3s ease' + (slide ? ', transform 0.3s ease' : '');
                el.style.transition = props;
                el.style.opacity = '1';
                if (slide) el.style.transform = 'translateY(0)';
                el.addEventListener('transitionend', function() {
                    el.style.transition = '';
                    if (slide) el.style.transform = '';
                }, { once: true });
            }

            function showInlineError(message) {
                var existing = document.getElementById('error-msg');
                if (existing) { existing.remove(); }

                var el = document.createElement('div');
                el.id = 'error-msg';
                el.className = 'error-msg';
                el.textContent = message;
                card.appendChild(el);
                el.style.opacity = '0';

                void el.offsetHeight;
                el.style.transition = 'opacity 0.3s ease';
                el.style.opacity = '1';
                el.addEventListener('transitionend', function onFade() {
                    el.removeEventListener('transitionend', onFade);
                    el.style.transition = '';
                    setTimeout(function() {
                        el.style.transition = 'opacity 0.3s ease';
                        el.style.opacity = '0';
                        el.addEventListener('transitionend', function onOut() {
                            el.removeEventListener('transitionend', onOut);
                            el.remove();
                        }, { once: true });
                    }, 1500);
                }, { once: true });
            }

            function showSuccess() {
                var body = document.body;
                if (body.classList.contains('cleaning')) return;

                var title = document.querySelector('.title');
                var subtitle = document.querySelector('.subtitle');
                var card = document.getElementById('card');

                body.classList.add('cleaning');

                setTimeout(function() {
                    var firstRect = title.getBoundingClientRect();

                    subtitle.style.display = 'none';
                    card.style.display = 'none';
                    body.classList.add('cleaning-complete');

                    var lastRect = title.getBoundingClientRect();

                    var deltaY = firstRect.top - lastRect.top;
                    if (Math.abs(deltaY) > 0.5) {
                        title.style.transform = 'translateY(' + deltaY + 'px)';
                        void title.offsetHeight;
                        title.style.transition = 'transform 0.4s ease';
                        title.style.transform = 'translateY(0)';
                        title.addEventListener('transitionend', function onEnd() {
                            title.removeEventListener('transitionend', onEnd);
                            title.style.transition = '';
                            title.style.transform = '';
                        }, { once: true });
                    }

                    var searchBar = document.getElementById('searchBar');
                    searchBar.classList.remove('hidden');
                    searchBar.classList.add('init-hidden');
                    void searchBar.offsetHeight;
                    searchBar.classList.remove('init-hidden');
                    searchBar.classList.add('load-in');
                    searchBar.addEventListener('animationend', function() {
                        searchBar.classList.remove('load-in');
                    }, { once: true });
                }, 400);
            }

            function toggleFilterTweak() {
                var tweak = document.getElementById('filterTweak');
                tweak.classList.toggle('active');
                updateResetVisibility();
            }

            function updateResetVisibility() {
                var slider = document.getElementById('filterTweakSlider');
                var reset = document.getElementById('filterTweakReset');
                if (parseInt(slider.value) !== 30) {
                    reset.classList.add('show');
                } else {
                    reset.classList.remove('show');
                }
            }

            function flashInputError() {
                pathInput.classList.remove('input-error');
                void pathInput.offsetWidth;
                pathInput.classList.add('input-error');
                setTimeout(function() {
                    pathInput.classList.remove('input-error');
                }, 1250);
            }

            pathInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    this.blur();
                }
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                var value = pathInput.value.trim();
                if (!value) {
                    flashInputError();
                    pathInput.focus();
                    return;
                }

                submitButton.classList.add('loading');
                submitButton.disabled = true;
                pathInput.disabled = true;
                document.getElementById('recursive').disabled = true;

                try {
                    var response = await fetch('/api/check/path', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            path: value,
                            recursive: document.getElementById('recursive').checked
                        })
                    });

                    var text = await response.text();
                    var payload;
                    try {
                        payload = JSON.parse(text);
                    } catch (e) {
                        payload = { error: text || 'Unexpected response from /api/check/path.' };
                    }

                    submitButton.classList.remove('loading');

                    if (!response.ok || (payload && payload.error)) {
                        var msg = payload && payload.error ? payload.error : 'Request failed.';
                        showInlineError(msg);
                        submitButton.disabled = false;
                        pathInput.disabled = false;
                        document.getElementById('recursive').disabled = false;
                        return;
                    }

                    showSuccess();
                    submitButton.disabled = false;
                } catch (error) {
                    submitButton.classList.remove('loading');
                    showInlineError(String(error));
                    submitButton.disabled = false;
                    pathInput.disabled = false;
                    document.getElementById('recursive').disabled = false;
                }
            });

            if (window._AI_ENABLED === false) {
                var searchArea = document.getElementById('searchArea');
                if (searchArea) { searchArea.style.display = 'none'; }
                var searchOverlay = document.getElementById('searchOverlay');
                if (searchOverlay) { searchOverlay.style.display = 'none'; }
            }

            if (window._DISKIDENTIFIER_ERROR) {
                document.getElementById('clean-form').innerHTML = '<div class="error-state">' + window._DISKIDENTIFIER_ERROR + '</div>';
            }

            document.getElementById('filterTweakBtn').addEventListener('click', toggleFilterTweak);
            document.getElementById('filterTweakSlider').addEventListener('input', updateResetVisibility);
            document.getElementById('filterTweakReset').addEventListener('click', function() {
                document.getElementById('filterTweakSlider').value = '30';
                updateResetVisibility();
            });

            var _currentSearchId = null;
            var _currentSource = null;

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (_currentSearchId) {
                        fetch('/api/search/cancel/' + _currentSearchId, { method: 'POST' });
                        if (_currentSource) { _currentSource.close(); _currentSource = null; }
                        document.getElementById('searchOverlay').classList.add('hidden');
                        _currentSearchId = null;
                        return;
                    }
                    if (_galleryResults) {
                        _galleryResults = null;
                        _galleryIndex = 0;
                        _gallerySearchId = null;
                        _imageCache = {};
                        gallery.classList.add('hidden');
                        galleryImg.classList.remove('gallery-image-loaded');
                        galleryImg.src = '';
                        return;
                    }
                    document.getElementById('searchInput').blur();
                    var tweak = document.getElementById('filterTweak');
                    if (tweak.classList.contains('active')) {
                        tweak.classList.remove('active');
                        updateResetVisibility();
                    }
                    return;
                }
                if (_galleryResults) {
                    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
                        e.preventDefault();
                        _goPrev();
                        return;
                    }
                    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
                        e.preventDefault();
                        _goNext();
                        return;
                    }
                }
            });

            document.addEventListener('click', function(e) {
                var tweak = document.getElementById('filterTweak');
                if (!tweak.classList.contains('active')) return;
                if (tweak.contains(e.target)) return;
                tweak.classList.remove('active');
                updateResetVisibility();
            });

            function performSearch() {
                var input = document.getElementById('searchInput');
                var query = input.value.trim();
                if (!query) return;

                var overlay = document.getElementById('searchOverlay');
                var fill = document.getElementById('progressFill');
                var info = document.getElementById('progressInfo');
                var detail = document.getElementById('progressDetail');

                overlay.classList.remove('hidden');
                fill.style.width = '0%';
                info.textContent = 'Starting...';
                detail.textContent = '';
                info.style.color = '';
                detail.style.color = '';

                fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        info.textContent = 'Error: ' + data.error;
                        setTimeout(function() { overlay.classList.add('hidden'); }, 2000);
                        return;
                    }
                    _currentSearchId = data.search_id;
                    _currentSource = new EventSource('/api/search/progress/' + _currentSearchId);
                    _currentSource.onmessage = function(event) {
                        var p = JSON.parse(event.data);
                        if (!p || !p.status) return;

                        switch (p.status) {
                            case 'queued':
                                info.textContent = 'Queued...';
                                break;
                            case 'running':
                                if (p.phase === 'filtering') {
                                    info.textContent = 'Filtering cached results...';
                                } else if (p.phase === 'loading_model') {
                                    info.textContent = 'Loading CLIP model...';
                                } else if (p.phase === 'assigning_workers') {
                                    info.textContent = 'Assigning workers...';
                                } else if (p.phase === 'workers_assigned') {
                                    info.textContent = p.total_workers + ' workers assigned';
                                } else if (p.phase && p.phase.startsWith('platoon_')) {
                                    var pc = p.total_images > 0 ? Math.round((p.processed / p.total_images) * 100) : 0;
                                    fill.style.width = Math.min(pc, 100) + '%';
                                    info.textContent = 'Platoon ' + p.current_platoon + '/' + p.total_platoons + ' (' + p.processed + '/' + p.total_images + ' images)';
                                    detail.textContent = p.total_workers + ' workers total';
                                } else if (p.phase === 'persisting') {
                                    info.textContent = 'Saving results...';
                                }
                                break;
                            case 'cancelled':
                                var cSearchId = _currentSearchId;
                                if (_currentSource) { _currentSource.close(); _currentSource = null; }
                                _currentSearchId = null;
                                if (p.results && p.results.results && p.results.results.length) {
                                    _gallerySearchId = cSearchId;
                                    _galleryResults = p.results.results;
                                    _galleryIndex = 0;
                                    _imageCache = {};
                                    gallery.classList.remove('hidden');
                                    _goToImage(0);
                                    overlay.classList.add('hidden');
                                } else {
                                    info.textContent = 'Cancelled - ' + (p.results ? p.results.total : 0) + ' results';
                                    info.style.color = '#d97706';
                                    detail.textContent = '';
                                    setTimeout(function() { overlay.classList.add('hidden'); }, 2000);
                                }
                                break;
                            case 'complete':
                                var cSearchId = _currentSearchId;
                                if (_currentSource) { _currentSource.close(); _currentSource = null; }
                                _currentSearchId = null;
                                if (p.results && p.results.results && p.results.results.length) {
                                    _gallerySearchId = cSearchId;
                                    _galleryResults = p.results.results;
                                    _galleryIndex = 0;
                                    _imageCache = {};
                                    gallery.classList.remove('hidden');
                                    _goToImage(0);
                                    overlay.classList.add('hidden');
                                } else {
                                    fill.style.width = '100%';
                                    info.textContent = 'Complete - ' + (p.results ? p.results.total : 0) + ' results';
                                    detail.textContent = '';
                                    setTimeout(function() { overlay.classList.add('hidden'); }, 2000);
                                }
                                break;
                            case 'error':
                                info.textContent = 'Error: ' + (p.error || 'Unknown');
                                detail.textContent = '';
                                if (_currentSource) { _currentSource.close(); _currentSource = null; }
                                _currentSearchId = null;
                                setTimeout(function() { overlay.classList.add('hidden'); }, 3000);
                                break;
                        }
                    };
                    _currentSource.onerror = function() {
                        info.textContent = 'Connection lost';
                        if (_currentSource) { _currentSource.close(); _currentSource = null; }
                        _currentSearchId = null;
                        setTimeout(function() { overlay.classList.add('hidden'); }, 2000);
                    };
                })
                .catch(function(err) {
                    info.textContent = 'Search request failed';
                    detail.textContent = String(err);
                    _currentSearchId = null;
                    setTimeout(function() { overlay.classList.add('hidden'); }, 2000);
                });
            }

            document.getElementById('searchGo').addEventListener('click', performSearch);


    </script>
</body>
</html>
